<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Canban Live</title>
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/5968/5968292.png" />
  
  <!-- Apple -->
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5968/5968292.png" />
  
  <!-- SEO -->
  <title>Kanban Pro — Collaborative Workspace</title>
  <meta name="description"
    content="Realtime collaborative Kanban board with task management, activity feeds, team collaboration, and WebSocket-powered synchronization." />
  
  <!-- Open Graph -->
  <meta property="og:title" content="Kanban Pro — Collaborative Workspace" />
  <meta property="og:description"
    content="Manage projects with realtime collaboration, drag-and-drop boards, activity tracking, and team workflows." />
  <meta property="og:image" content="https://cdn-icons-png.flaticon.com/512/5968/5968292.png" />
  <meta property="og:type" content="website" />
  
  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body,#root{height:100%}
    body{font-family:'DM Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-track{background:transparent}
    ::-webkit-scrollbar-thumb{background:var(--sb,#d6cfc7);border-radius:99px}

    @keyframes fadeUp    {from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes fadeIn    {from{opacity:0}to{opacity:1}}
    @keyframes scaleUp   {from{opacity:0;transform:scale(.94)translateY(12px)}to{opacity:1;transform:scale(1)translateY(0)}}
    @keyframes slideIn   {from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:translateX(0)}}
    @keyframes slideUp   {from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes toastIn   {from{opacity:0;transform:translateX(110%)}to{opacity:1;transform:translateX(0)}}
    @keyframes spin      {to{transform:rotate(360deg)}}
    @keyframes pulse     {0%,100%{opacity:1}50%{opacity:.3}}
    @keyframes lift      {0%{transform:rotate(0)scale(1)}100%{transform:rotate(2deg)scale(1.04)}}
    @keyframes dropGlow  {0%,100%{box-shadow:0 0 0 0 transparent}50%{box-shadow:0 0 0 4px rgba(180,83,9,.2)}}
    @keyframes heroFloat {0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
    @keyframes gradShift {0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
    @keyframes cardIn    {from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
